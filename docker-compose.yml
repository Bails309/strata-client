services:
  # ── 1. Custom guacd (FreeRDP 3 + Kerberos) ──────────────────────────
  guacd:
    build:
      context: ./guacd
      dockerfile: Dockerfile
    image: strata/custom-guacd:latest
    restart: unless-stopped
    networks:
      - guac-internal
    volumes:
      - guac-recordings:/var/lib/guacamole/recordings
      - guac-drive:/var/lib/guacamole/drive
      - krb5-config:/etc/krb5
      - backend-config:/app/config:ro
    environment:
      - KRB5_CONFIG=/etc/krb5/krb5.conf
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 1b. Additional guacd sidecar
  # To use, set GUACD_INSTANCES=guacd-2:4822 in your .env file.
  # You can duplicate this block for guacd-3, guacd-4, etc.
  guacd-2:
    build:
      context: ./guacd
      dockerfile: Dockerfile
    image: strata/custom-guacd:latest
    restart: unless-stopped
    profiles:
      - scale
    networks:
      - guac-internal
    volumes:
      - guac-recordings:/var/lib/guacamole/recordings
      - guac-drive:/var/lib/guacamole/drive
      - krb5-config:/etc/krb5
      - backend-config:/app/config:ro
    environment:
      - KRB5_CONFIG=/etc/krb5/krb5.conf
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 2. Rust Backend (Proxy / API) ───────────────────────────────────
  #
  # Built from backend/Dockerfile — the unified image that
  # ships with Xvnc + Chromium baked in. The Web Browser Session
  # protocol works out of the box; RDP/SSH/VNC always work; the
  # VDI protocol is OFF by default and opted into via the overlay
  # docker-compose.vdi.yml (which adds the /var/run/docker.sock
  # mount — see the security warning in that file).
  #
  # Run:
  #   docker compose up -d                                                 # web + RDP + SSH + VNC
  #   docker compose -f docker-compose.yml -f docker-compose.vdi.yml up -d # +VDI
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: strata/backend:latest
    restart: unless-stopped
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - backend-config:/app/config
      - guac-recordings:/var/lib/guacamole/recordings:ro
      - guac-drive:/var/lib/guacamole/drive
      - krb5-config:/etc/krb5
      # Operator-supplied Playwright/Puppeteer login scripts for the
      # `web` protocol. Mount read-only so a compromised backend can't
      # tamper with the kiosk-login automation source. Empty/absent
      # directory is harmless if no `web` connection references a
      # login_script.
      - ${WEB_LOGIN_SCRIPTS_DIR:-./web-login-scripts}:/var/lib/strata/web-login-scripts:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-strata}:${POSTGRES_PASSWORD:-strata_default}@postgres-local:5432/${POSTGRES_DB:-strata}}
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
      - GUACD_INSTANCES=${GUACD_INSTANCES:-}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
      - STRATA_ALLOWED_ORIGINS=${STRATA_ALLOWED_ORIGINS:-}
      # Public base URL for SSO redirect_uri construction when the
      # backend sits behind a reverse proxy / DMZ relay that doesn't
      # forward Host/X-Forwarded-* headers. Optional — when unset,
      # the backend falls back to inferring from request headers.
      - BASE_URL=${BASE_URL:-}
      # Comma-separated allowlist of Host header values accepted when
      # deriving base URL from request headers. Ignored if BASE_URL
      # is set.
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      # Web (Chromium kiosk) — always available because the binaries
      # are baked into the image. Operators who don't define `web`
      # connections simply never trigger a spawn.
      - STRATA_WEB_ENABLED=${STRATA_WEB_ENABLED:-true}
      - STRATA_WEB_XVNC_PATH=/usr/bin/Xvnc
      - STRATA_WEB_CHROMIUM_PATH=/usr/bin/chromium
      - STRATA_WEB_LOGIN_SCRIPTS_DIR=/var/lib/strata/web-login-scripts
      # Hostname guacd uses to reach the spawned Xvnc listener. Must
      # be the backend's service name on the docker network — guacd
      # is a sibling container, so 127.0.0.1 won't work.
      - STRATA_WEB_VNC_HOST=${STRATA_WEB_VNC_HOST:-backend}
      # VDI (docker-spawned desktops) — DISABLED at this layer; flip
      # to true via docker-compose.vdi.yml which also mounts docker.sock.
      - STRATA_VDI_ENABLED=${STRATA_VDI_ENABLED:-false}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    depends_on:
      guacd:
        condition: service_healthy
      vault:
        condition: service_healthy

  # ── 3. Frontend SPA ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: strata/frontend:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/log/nginx:uid=101,gid=101
      - /run:uid=101,gid=101
      - /etc/nginx/conf.d:uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - guac-internal
    volumes:
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - backend


  # ── 5. Local PostgreSQL ─────────────────────────────────────────────
  # Pinned base image (W1-8): digest refreshed by Renovate / Dependabot
  # (see .github/dependabot.yml docker ecosystem).
  postgres-local:
    image: postgres:16-alpine@sha256:93d55776e04376e19adb2733e3ccebb4392ee7dd86d8ff238503b30fe719c84f
    restart: unless-stopped
    profiles:
      - local-db
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-strata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strata_default}
      POSTGRES_DB: ${POSTGRES_DB:-strata}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strata -d strata"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 6. Bundled HashiCorp Vault ──────────────────────────────────────
  vault:
    image: hashicorp/vault:1.19@sha256:c4298db7f9b2ea8cab452cbff5877749087913aa035fcae62026cf16132929f5
    restart: unless-stopped
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - vault-data:/vault/data
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_API_ADDR: "http://vault:8200"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /vault/config
        cat > /vault/config/vault.hcl <<'EOF'
        storage "file" {
          path = "/vault/data"
        }
        listener "tcp" {
          address     = "0.0.0.0:8200"
          tls_disable = 1
        }
        api_addr     = "http://vault:8200"
        cluster_addr = "http://vault:8201"
        ui           = false
        disable_mlock = true
        EOF
        vault server -config=/vault/config/vault.hcl
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>&1 | grep -qE 'Sealed|initialized' || wget -qO- http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200 > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    driver: local
  guac-recordings:
    driver: local
  guac-drive:
    driver: local
  krb5-config:
    driver: local
  backend-config:
    driver: local
  vault-data:
    driver: local

networks:
  guac-internal:
    driver: bridge
