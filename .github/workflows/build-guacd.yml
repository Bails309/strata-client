name: Build Custom guacd Image

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      guac_version:
        description: 'Guacamole Server version/tag to build'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/custom-guacd

permissions:
  contents: read

jobs:
  build-guacd:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout this repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine upstream version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.guac_version }}" ]; then
            echo "tag=${{ github.event.inputs.guac_version }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(curl -sL https://api.github.com/repos/apache/guacamole-server/releases/latest | jq -r '.tag_name')
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build guacd locally for smoke test
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./guacd
          file: ./guacd/Dockerfile
          push: false
          load: true
          build-args: |
            GUAC_VERSION=${{ steps.version.outputs.tag }}
          tags: strata/custom-guacd:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test guacd container
        run: |
          # Start the container detached, mapping guacd default port 4822.
          docker run -d --name guacd-smoke -p 4822:4822 strata/custom-guacd:smoke-test
          # Wait up to 30s for the port to open.
          for i in $(seq 1 30); do
            if nc -z localhost 4822 2>/dev/null; then
              echo "guacd is listening on :4822"
              break
            fi
            sleep 1
          done
          if ! nc -z localhost 4822 2>/dev/null; then
            echo "ERROR: guacd failed to start"
            docker logs guacd-smoke || true
            exit 1
          fi
          # Verify the container is still running (didn't crash).
          if [ "$(docker inspect -f '{{.State.Running}}' guacd-smoke)" != "true" ]; then
            echo "ERROR: guacd container exited"
            docker logs guacd-smoke || true
            exit 1
          fi
          docker rm -f guacd-smoke

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push custom guacd
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./guacd
          file: ./guacd/Dockerfile
          push: true
          build-args: |
            GUAC_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
