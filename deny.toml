# cargo-deny configuration
# Complements `cargo-audit` (which only catches RUSTSEC IDs) with:
#   • license allow-list — licenses we have legal sign-off on
#   • banned/duplicate crate detection
#   • crate source allow-list (block git/registry mismatches)
# Run locally with: cargo deny --all-features check
# CI invokes the same in .github/workflows/ci.yml.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ── Advisories ─────────────────────────────────────────────────────────
# Mirror what cargo-audit already enforces, kept here so `cargo deny
# check` is a one-stop call locally. Per-advisory ignores live in
# backend/.cargo/audit.toml so both tools stay in sync.
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

# ── License allow-list ────────────────────────────────────────────────
# Only permissive OSS licenses compatible with Apache-2.0 (our own
# license) are allowed. Any new license that shows up in the dep tree
# will fail the gate and force an explicit review.
[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# `ring` ships a custom non-SPDX licence string; clarify it explicitly
# so we don't have to relax confidence-threshold globally.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ── Crate bans ─────────────────────────────────────────────────────────
# `multiple-versions = "warn"` — flag drift but don't fail; a single
# Cargo.lock root keeps duplicates rare. Lift to "deny" once the tree
# is fully de-duped.
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    # `openssl` pulls in C OpenSSL — we standardise on rustls.
    { crate = "openssl", reason = "rustls is the project-wide TLS stack" },
    { crate = "openssl-sys", reason = "rustls is the project-wide TLS stack" },
    # `native-tls` defeats the rustls policy.
    { crate = "native-tls", reason = "rustls is the project-wide TLS stack" },
]
skip = []
skip-tree = []

# ── Source allow-list ─────────────────────────────────────────────────
# Refuse to build against unknown registries or random git forks. All
# deps must come from crates.io.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
