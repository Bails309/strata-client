{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "strata-dmz.fullname" . }}-secrets
  labels: {{- include "strata-dmz.labels" . | nindent 4 }}
type: Opaque
stringData:
  operatorToken: {{ required "secrets.values.operatorToken required when secrets.create=true" .Values.secrets.values.operatorToken | quote }}
  linkPsks:      {{ required "secrets.values.linkPsks required when secrets.create=true"      .Values.secrets.values.linkPsks      | quote }}
  edgeHmacKey:   {{ required "secrets.values.edgeHmacKey required when secrets.create=true"   .Values.secrets.values.edgeHmacKey   | quote }}
{{- end }}
---
{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "strata-dmz.fullname" . }}
  labels: {{- include "strata-dmz.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels: {{- include "strata-dmz.selectorLabels" . | nindent 6 }}
{{- end }}
