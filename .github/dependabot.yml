# Dependabot configuration
#
# Keeps direct dependencies up to date across every ecosystem used by the repo.
# Coding Standards §13.2 (supply-chain hygiene) requires automated update PRs
# so transitively-reached advisories surface within the SLA window.
#
# Grouping rules: minor + patch updates are collapsed into a single PR per
# ecosystem to cut review noise; majors stay separate so breaking changes get
# their own review.
version: 2
updates:
  # Rust / backend
  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    groups:
      rust-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend (Vite / React / Vitest / UI deps)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
    groups:
      frontend-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # End-to-end test harness (Playwright)
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
      - "e2e"
    groups:
      e2e-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions (pin/refresh action SHAs)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Container base images — backend
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  # Container base images — frontend
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  # Container base images — guacd
  - package-ecosystem: "docker"
    directory: "/guacd"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
