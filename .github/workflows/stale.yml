name: Stale issues and PRs

# Closes abandoned issues / PRs after a quiet period so the tracker reflects
# what's actually being worked on. Conservative defaults — exempts pinned,
# security, roadmap, and good-first-issue items.

on:
  schedule:
    - cron: "37 1 * * *"  # daily 01:37 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in 14 days unless there is new activity, the `stale` label is removed, or it is added to a milestone.

            If this is still relevant, a comment with current reproduction steps or up-to-date context is the fastest way to keep it open.
          close-issue-message: |
            Closing as inactive. If this is still relevant on a current release, please open a fresh issue with up-to-date reproduction steps and we will be happy to triage it again.
          exempt-issue-labels: "pinned,security,roadmap,good first issue,help wanted,blocked"

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          stale-pr-message: |
            This pull request has been inactive for 30 days. It will be closed in 14 days unless there is new activity or the `stale` label is removed.

            Rebasing on `main` and pushing a fresh commit will reset the timer.
          close-pr-message: |
            Closing as inactive. The branch is preserved — feel free to reopen once it has been rebased on `main`.
          exempt-pr-labels: "pinned,security,blocked,work in progress,WIP"

          # Hygiene
          operations-per-run: 60
          remove-stale-when-updated: true
          ascending: true  # process oldest first
