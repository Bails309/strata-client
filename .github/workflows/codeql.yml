name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly rescan against the latest CodeQL query packs, even without a push.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write  # upload results to Code Scanning
  actions: read

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          # Rust is analysed via the autobuild mode. Backend code lives in ./backend.
          - language: rust
            build-mode: autobuild

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      # Rust needs an explicit build directory.
      - name: Install Rust toolchain (rust job only)
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Autobuild (rust only)
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3
        with:
          working-directory: backend

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
