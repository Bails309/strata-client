services:
  # ── 1. Custom guacd (FreeRDP 3 + Kerberos) ──────────────────────────
  guacd:
    build:
      context: ./guacd
      dockerfile: Dockerfile
    image: strata/custom-guacd:latest
    restart: unless-stopped
    networks:
      - guac-internal
    volumes:
      - guac-recordings:/var/lib/guacamole/recordings
      - guac-drive:/var/lib/guacamole/drive
      - krb5-config:/etc/krb5
      - backend-config:/app/config:ro
    environment:
      - KRB5_CONFIG=/etc/krb5/krb5.conf
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 1b. Additional guacd sidecar
  # To use, set GUACD_INSTANCES=guacd-2:4822 in your .env file.
  # You can duplicate this block for guacd-3, guacd-4, etc.
  guacd-2:
    build:
      context: ./guacd
      dockerfile: Dockerfile
    image: strata/custom-guacd:latest
    restart: unless-stopped
    profiles:
      - scale
    networks:
      - guac-internal
    volumes:
      - guac-recordings:/var/lib/guacamole/recordings
      - guac-drive:/var/lib/guacamole/drive
      - krb5-config:/etc/krb5
      - backend-config:/app/config:ro
    environment:
      - KRB5_CONFIG=/etc/krb5/krb5.conf
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 2. Rust Backend (Proxy / API) ───────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: strata/backend:latest
    restart: unless-stopped
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - backend-config:/app/config
      - guac-recordings:/var/lib/guacamole/recordings:ro
      - guac-drive:/var/lib/guacamole/drive
      - krb5-config:/etc/krb5
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-strata}:${POSTGRES_PASSWORD:-strata_default}@postgres-local:5432/${POSTGRES_DB:-strata}}
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
      - GUACD_INSTANCES=${GUACD_INSTANCES:-}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
      - STRATA_ALLOWED_ORIGINS=${STRATA_ALLOWED_ORIGINS:-}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    depends_on:
      guacd:
        condition: service_healthy
      vault:
        condition: service_healthy

  # ── 3. Frontend SPA ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: strata/frontend:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/log/nginx:uid=101,gid=101
      - /run:uid=101,gid=101
      - /etc/nginx/conf.d:uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - guac-internal
    volumes:
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - backend


  # ── 5. Local PostgreSQL ─────────────────────────────────────────────
  # Pinned base image (W1-8): digest refreshed by Renovate / Dependabot
  # (see .github/dependabot.yml docker ecosystem).
  postgres-local:
    image: postgres:16-alpine@sha256:93d55776e04376e19adb2733e3ccebb4392ee7dd86d8ff238503b30fe719c84f
    restart: unless-stopped
    profiles:
      - local-db
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-strata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strata_default}
      POSTGRES_DB: ${POSTGRES_DB:-strata}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strata -d strata"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 6. Bundled HashiCorp Vault ──────────────────────────────────────
  vault:
    image: hashicorp/vault:1.19@sha256:c4298db7f9b2ea8cab452cbff5877749087913aa035fcae62026cf16132929f5
    restart: unless-stopped
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - vault-data:/vault/data
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_API_ADDR: "http://vault:8200"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /vault/config
        cat > /vault/config/vault.hcl <<'EOF'
        storage "file" {
          path = "/vault/data"
        }
        listener "tcp" {
          address     = "0.0.0.0:8200"
          tls_disable = 1
        }
        api_addr     = "http://vault:8200"
        cluster_addr = "http://vault:8201"
        ui           = false
        disable_mlock = true
        EOF
        vault server -config=/vault/config/vault.hcl
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>&1 | grep -qE 'Sealed|initialized' || wget -qO- http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200 > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    driver: local
  guac-recordings:
    driver: local
  guac-drive:
    driver: local
  krb5-config:
    driver: local
  backend-config:
    driver: local
  vault-data:
    driver: local

networks:
  guac-internal:
    driver: bridge
