# strata-client override for ClamAV's freshclam configuration.
#
# Replaces the auto-generated /etc/clamav/freshclam.conf shipped by
# the upstream `clamav/clamav:stable` image so we can pin two
# settings the image does not expose via environment variables:
#
#   1. `OnUpdateExecute /usr/bin/clamdscan --reload`
#      Forces clamd to reload its in-memory signature database after
#      every successful update. The image's default relies solely on
#      `NotifyClamd`, which connects to clamd's UNIX socket at
#      /tmp/clamd.sock â€” that path races on startup and fails
#      silently with "Can't connect to clamd through /tmp/clamd.sock"
#      in freshclam.log. `clamdscan --reload` uses the TCP socket
#      (3310, already required by the backend for INSTREAM scans),
#      which is created earlier and is the same path the rest of the
#      stack uses, so it is far more reliable.
#
#   2. `NotifyClamd /etc/clamav/clamd.conf`
#      Kept as a belt-and-braces secondary path; if the local socket
#      ever becomes reachable it'll fire too. OnUpdateExecute is the
#      authoritative trigger.
#
# Update cadence (`Checks` / freshclam `--checks`) is configured via
# the FRESHCLAM_CHECKS environment variable in docker-compose.yml,
# which the image passes through to the freshclam CLI. The image
# defaults to 1 (once per day) â€” we override it to 24 (hourly) to
# match ClamAV's recommended cadence.

UpdateLogFile /var/log/clamav/freshclam.log
DatabaseOwner clamav
DatabaseMirror database.clamav.net
ScriptedUpdates yes
NotifyClamd /etc/clamav/clamd.conf
OnUpdateExecute /usr/bin/clamdscan --reload
