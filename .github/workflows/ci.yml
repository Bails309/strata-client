name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # ── Secrets scanning ──────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency advisory scanning (Coding Standards §13.2 / §18.2) ──
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Rust: RustSec advisory database
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - name: Cache cargo-audit binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-bin

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi

      - name: Run cargo audit (backend)
        working-directory: backend
        # Fail on vulnerabilities, unsound, and unmaintained advisories.
        # Yanked crates remain informational (no RUSTSEC ID to ignore).
        # Per-advisory ignores with justifications live in backend/audit.toml.
        run: cargo audit --deny unsound --deny unmaintained

      # Node: npm advisory database
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

      - name: npm audit (e2e)
        working-directory: e2e
        run: npm audit --audit-level=high --omit=dev

  # ── Database migration validation ─────────────────────────────────
  migrations-check:
    name: DB Migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: strata
          POSTGRES_PASSWORD: strata
          POSTGRES_DB: strata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U strata"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls --locked
      - name: Apply all migrations
        env:
          DATABASE_URL: postgres://strata:strata@localhost:5432/strata
        run: sqlx migrate run --source backend/migrations
      - name: Verify no pending migrations
        env:
          DATABASE_URL: postgres://strata:strata@localhost:5432/strata
        run: |
          # Re-run should be a no-op. Capture output; fail if any "applied" lines appear.
          OUT=$(sqlx migrate run --source backend/migrations)
          echo "$OUT"
          if echo "$OUT" | grep -i "applied"; then
            echo "ERROR: migrations were not idempotent"
            exit 1
          fi

  # ── Backend: lint, check, test ────────────────────────────────────
  backend-check:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry & build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock', 'backend/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test -- --test-threads=1

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate backend coverage report
        run: cargo tarpaulin --skip-clean --out xml --out html --output-dir coverage/ --exclude-files src/main.rs --fail-under 19 -- --test-threads=1

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  # ── Frontend: lint, typecheck, unit tests ─────────────────────────
  frontend-check:
    name: Frontend (React)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ESLint runs as a hard gate. The historical 198-error baseline of
      # `jsx-a11y/label-has-associated-control` and `no-autofocus` issues has
      # been demoted to warnings (tracked under W4-2 for per-page ratchet);
      # all remaining errors are correctness/security and must stay at zero.
      - name: ESLint (frontend)
        run: npm run lint

      - name: Prettier format check (frontend)
        run: npm run format:check

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

      - name: Build
        run: npm run build

  # ── E2E tests (requires running stack) ────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [backend-check, frontend-check]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and start all services
        run: docker compose --profile local-db up -d --build --wait
        timeout-minutes: 20
        env:
          DEFAULT_ADMIN_PASSWORD: admin

      - name: Wait for backend readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/status > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend did not become ready"
          docker compose logs backend
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install E2E dependencies
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail 50

      - name: Stop services
        if: always()
        run: docker compose --profile local-db down -v

  # ── Docker image builds (no push on PR) ───────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [backend-check, frontend-check]
    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
