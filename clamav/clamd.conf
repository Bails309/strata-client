# strata-client override for ClamAV's clamd configuration.
#
# Replaces the auto-generated /etc/clamav/clamd.conf shipped by
# the upstream `clamav/clamav:stable` image so we can raise the
# scan-size ceilings to match Strata's 500 MB upload cap (defined
# in backend/src/services/file_store.rs::MAX_FILE_SIZE and the
# DefaultBodyLimit layers in backend/src/routes/mod.rs).
#
# The upstream defaults — `StreamMaxLength 25M`, `MaxFileSize 25M`,
# `MaxScanSize 100M` — abort INSTREAM scans of large Quick Share
# uploads (e.g. Java WARs, MSI installers, full-disk images). With
# STRATA_AV_FAIL_MODE=block (the shipped default), every such scan
# becomes a 400 "Antivirus scan failed: INSTREAM size limit
# exceeded. ERROR" to the user, and a Verdict::Error entry in the
# audit log — neither obviously a configuration problem.
#
# Keep these values in sync with STRATA_AV_MAX_SCAN_SIZE in .env
# (currently 500 MB = 524288000 bytes). If you raise the backend
# cap, raise these too; if you lower the backend cap, these can
# stay high without harm — the backend pre-check skips oversize
# files before contacting clamd at all.

# ── Network ──
# Listen on the internal compose network; no UNIX socket exposed
# to the host. The upstream image still creates /tmp/clamd.sock
# for freshclam's NotifyClamd fallback, but our freshclam.conf
# uses `OnUpdateExecute clamdscan --reload` over TCP as the
# primary reload trigger (see clamav/freshclam.conf for rationale).
TCPSocket 3310
TCPAddr 0.0.0.0
LocalSocket /tmp/clamd.sock
LocalSocketGroup clamav
LocalSocketMode 660
FixStaleSocket yes

# ── Database ──
DatabaseDirectory /var/lib/clamav
LogFile /var/log/clamav/clamd.log
LogTime yes
LogClean no
LogVerbose no
PidFile /var/run/clamd.pid
TemporaryDirectory /tmp
User clamav

# ── Scan limits (Strata override) ──
#
# StreamMaxLength: hard ceiling on a single INSTREAM payload. The
# backend's clamd_instream() chunks the file and sends a
# zero-length terminator; this is the cap on the SUM of those
# chunks per scan. Must be >= STRATA_AV_MAX_SCAN_SIZE.
StreamMaxLength 512M
#
# MaxFileSize: per-entry cap during archive extraction. Files
# inside containers (ZIP, JAR, WAR, ISO, etc.) larger than this
# are skipped silently by the engine, which would let a malware
# author hide payloads behind a fat container header. Keep equal
# to StreamMaxLength.
MaxFileSize 512M
#
# MaxScanSize: total bytes the engine will examine per request
# (the top-level file plus everything it decompresses). Archives
# with deep nesting can expand 4-10x, so allow 2x StreamMaxLength
# of headroom before the engine bails out.
MaxScanSize 1024M
#
# Archive recursion / file-count limits. The upstream defaults
# (17 levels, 10000 files) are sensible for general-purpose use;
# keep them explicit so the values are auditable.
MaxRecursion 17
MaxFiles 10000

# ── Detection categories ──
# We rely on the public signature DB for malware detection; PUA
# (Potentially Unwanted Applications) is noisy on legitimate
# installers and stays off. Heuristic alerts are kept on — they
# catch broken/malformed containers which are common in active
# exploitation.
DetectPUA no
HeuristicScanPrecedence yes
AlertBrokenExecutables yes
AlertEncryptedArchive no
AlertEncryptedDoc no
AlertOLE2Macros no

# ── Engine behaviour ──
# Bytecode signatures are part of every official DB update and
# materially improve detection rates; disable only if you have
# a specific reason to distrust the bytecode subsystem.
Bytecode yes
BytecodeSecurity TrustSigned
BytecodeTimeout 60000

# ── Concurrency ──
# 10 worker threads matches the upstream default and is sized for
# the 2-vCPU resource ceiling in docker-compose.yml. Bump only if
# you raise the deploy.resources.limits.cpus value to match.
MaxThreads 10
MaxConnectionQueueLength 30
ReadTimeout 180
CommandReadTimeout 30
SendBufTimeout 200
MaxQueue 100
IdleTimeout 30
SelfCheck 600
