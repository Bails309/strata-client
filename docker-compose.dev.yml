# ⚠️ REMOVE-BEFORE-PROD ⚠️ — TAG: STRATA_DEV_ONLY_REMOVE_BEFORE_RELEASE
#
# This compose file is developer-workstation-only. Production and CI
# never reference it. It exists solely to work around Windows
# Defender Controlled Folder Access blocking cargo.exe writes to the
# workspace `target/` directory.
#
# DELETE THIS FILE (and `backend/Dockerfile.dev`, and the dev section
# in `docs/runbooks/rustguac-parity-tracker.md`) once any of:
#   1. CI is the canonical green-build authority and `cargo check`
#      moves out of the local-developer loop.
#   2. Defender CFA is whitelisted for cargo.exe across the dev fleet.
#   3. The team moves off Windows for backend dev.
# Search the repo for `STRATA_DEV_ONLY_REMOVE_BEFORE_RELEASE` to find
# every file that needs to disappear together.

services:
  # ── Local cargo check / test / clippy inside a Linux container ─────
  #
  # Why this exists:
  #   On Windows hosts where Defender Controlled Folder Access (or
  #   any AV/EDR product) blocks cargo.exe / rustc.exe from writing
  #   the workspace `target/` directory, cargo check fails before it
  #   can compile. Running the same toolchain inside a Linux
  #   container sidesteps the policy: the container's overlay
  #   filesystem is invisible to host AV.
  #
  # First-time setup (one-off, ~3 minutes):
  #   docker compose -f docker-compose.dev.yml build cargo-check
  #
  # Then:
  #   docker compose -f docker-compose.dev.yml run --rm cargo-check
  #   docker compose -f docker-compose.dev.yml run --rm cargo-test
  #   docker compose -f docker-compose.dev.yml run --rm cargo-clippy
  #
  # The named volumes `strata-cargo-registry` and `strata-cargo-target`
  # persist the Cargo cache + build artefacts between runs so
  # incremental checks complete in seconds.
  #
  # The source tree is bind-mounted at /workspace. `target/` lives in
  # a named volume (not on the host) so build artefacts never touch
  # the host filesystem. Run formatters / `cargo fix` on the host,
  # not in this container.
  cargo-check:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: strata/backend-dev:latest
    working_dir: /workspace/backend
    command: ["cargo", "check", "--all-targets", "--locked"]
    volumes:
      - ./:/workspace
      - strata-cargo-registry:/usr/local/cargo/registry
      - strata-cargo-target:/workspace/backend/target
    environment:
      CARGO_TARGET_DIR: /workspace/backend/target
      CARGO_INCREMENTAL: "0"
      RUST_BACKTRACE: "1"

  cargo-test:
    extends:
      service: cargo-check
    command: ["cargo", "test", "--locked", "--no-run"]

  cargo-clippy:
    extends:
      service: cargo-check
    command: ["cargo", "clippy", "--all-targets", "--locked", "--", "-D", "warnings"]

volumes:
  strata-cargo-registry:
    driver: local
  strata-cargo-target:
    driver: local
