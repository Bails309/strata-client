name: OpenSSF Scorecard

# Runs the OpenSSF Scorecard against this repo on a weekly cadence and on
# push to main. Publishes results to:
#   1. The repository's Security tab (Code scanning alerts).
#   2. The public scorecard.dev API, so the README badge auto-updates.
#
# Docs: https://github.com/ossf/scorecard-action

on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 1"  # Mondays 04:23 UTC
  push:
    branches:
      - main

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF
      id-token: write         # publish results to scorecard.dev
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results so https://api.securityscorecards.dev/projects/...
          # serves them — that's what the README badge reads.
          publish_results: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
