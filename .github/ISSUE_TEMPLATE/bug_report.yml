name: 🐛 Bug report
description: Something is broken or behaving unexpectedly.
title: "bug: <one-line summary>"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **Before you continue:**
        - For **security issues**, please use [Private vulnerability reporting](https://github.com/Bails309/strata-client/security/advisories/new) instead of this form.
        - For **questions / how-do-I**, please use [Discussions](https://github.com/Bails309/strata-client/discussions).
  - type: input
    id: version
    attributes:
      label: Strata Client version
      description: Output of `cat VERSION`, the value shown in the SPA's About page, or the image tag you pulled.
      placeholder: "1.4.1"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment topology
      multiple: false
      options:
        - Bundled Postgres + bundled Vault (default `docker compose up -d`)
        - External Postgres + bundled Vault
        - Bundled Postgres + external Vault
        - External Postgres + external Vault
        - Other (please describe in "Additional context")
    validations:
      required: true
  - type: dropdown
    id: protocol
    attributes:
      label: Affected connection protocol(s)
      multiple: true
      options:
        - RDP
        - VNC
        - SSH
        - Telnet
        - Kubernetes pod console
        - Web kiosk
        - VDI desktop container
        - Not protocol-specific
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps. The smaller and more deterministic the better.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Output from the affected container(s). Examples:
        ```
        docker compose logs --tail=200 backend
        docker compose logs --tail=200 guacd
        docker compose logs --tail=200 frontend
        ```
        **Redact** any tokens, real hostnames, real usernames, or credentials before pasting.
      render: shell
  - type: input
    id: browser
    attributes:
      label: Browser (if frontend / session-related)
      placeholder: "Chrome 132 on Windows 11"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else useful — recent upgrade, custom guacd patches, reverse proxy in front, etc.
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I have read [CONTRIBUTING.md](https://github.com/Bails309/strata-client/blob/main/CONTRIBUTING.md) and [SUPPORT.md](https://github.com/Bails309/strata-client/blob/main/SUPPORT.md).
          required: true
