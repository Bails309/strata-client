apiVersion: v1
kind: Service
metadata:
  name: {{ include "strata-dmz.fullname" . }}
  labels: {{- include "strata-dmz.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "strata-dmz.selectorLabels" . | nindent 4 }}
  ports:
    - name: public
      port: {{ .Values.service.publicPort }}
      targetPort: public
      protocol: TCP
---
# Separate Service for the link port. Cluster-internal only --
# external Ingress should NOT route to this.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "strata-dmz.fullname" . }}-link
  labels: {{- include "strata-dmz.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "strata-dmz.selectorLabels" . | nindent 4 }}
  ports:
    - name: link
      port: {{ .Values.service.linkPort }}
      targetPort: link
      protocol: TCP
---
# Operator Service. Reachable only from pods labelled per
# networkPolicy.operatorClientSelector.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "strata-dmz.fullname" . }}-operator
  labels: {{- include "strata-dmz.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "strata-dmz.selectorLabels" . | nindent 4 }}
  ports:
    - name: operator
      port: {{ .Values.service.operatorPort }}
      targetPort: operator
      protocol: TCP
