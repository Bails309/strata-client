name: Image Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF to Code Scanning
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver: docker

      - name: Build ${{ matrix.service }} image (local tag only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: strata/${{ matrix.service }}:scan
          # No GHA build cache: Docker would replay a stale apt layer and
          # ship outdated OS packages, which Trivy then flags as CVEs that
          # are already fixed upstream. A cold build is 2-3 min slower but
          # guarantees `apt-get update && upgrade` actually runs.

      # Coding Standards §18.2 / §18.3 — fail the build on any Critical/High CVE
      # in a deployable image. The SARIF upload feeds Code Scanning so findings
      # surface on the PR even when the step has failed.
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'image'
          image-ref: strata/${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library

      # Diagnostic: also print findings to the job log as a table on failure.
      # SARIF output suppresses the human-readable CVE list, so this gives a
      # quick view in the Actions log without waiting for Code Scanning.
      - name: Print Trivy findings (table)
        if: failure()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'image'
          image-ref: strata/${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library

      # Only upload when Trivy actually produced a SARIF. Earlier failures
      # (image build, action setup) leave the file missing, which made
      # `if: always()` upload-sarif fail with "Path does not exist".
      - name: Upload Trivy SARIF to Code Scanning
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.service)) != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
