name: Dependency Review

# Comments on every PR with a diff of changed dependencies, flags new CVEs,
# and blocks merge if a vulnerability above the configured severity is
# introduced. Free GitHub-native action; no external service required.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write  # post the summary comment

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Block PRs that introduce HIGH or CRITICAL CVEs in new dependencies.
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Allow only OSI / FSF-approved licences for new dependencies.
          # Add to this list (deny-licenses) rather than allow-listing — keeps
          # the surface conservative.
          deny-licenses: >-
            AGPL-1.0-only,
            AGPL-1.0-or-later,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0-only,
            GPL-3.0-or-later,
            LGPL-2.0-only,
            LGPL-2.0-or-later,
            LGPL-2.1-only,
            LGPL-2.1-or-later,
            LGPL-3.0-only,
            LGPL-3.0-or-later
          # Per-package overrides for the license deny-list. These are
          # CI-only GitHub Actions: their code runs on the runner, never
          # links into any shipped Strata binary, and never ends up on a
          # customer machine. License copyleft therefore does not apply.
          #
          # - Swatinem/rust-cache is LGPL-3.0; it is a Cargo build cache
          #   helper invoked only during CI.
          allow-dependencies-licenses: >-
            pkg:githubactions/Swatinem/rust-cache
