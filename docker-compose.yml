services:
  # ── 1. Custom guacd (FreeRDP 3 + Kerberos) ──────────────────────────
  guacd:
    build:
      context: ./guacd
      dockerfile: Dockerfile
    image: strata/custom-guacd:latest
    restart: unless-stopped
    networks:
      - guac-internal
    volumes:
      - guac-recordings:/var/lib/guacamole/recordings
      - guac-drive:/var/lib/guacamole/drive
      - krb5-config:/etc/krb5
      - backend-config:/app/config:ro
    environment:
      - KRB5_CONFIG=/etc/krb5/krb5.conf
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      # DAC_OVERRIDE / CHOWN / FOWNER: the entrypoint runs as root and
      # chowns /var/lib/guacamole/{recordings,drive} to guacd:guacd before
      # su-exec drops privileges. su-exec strips all capabilities on uid
      # change, so guacd itself must own the directory to be able to
      # write recordings. DAC_OVERRIDE is kept as defence-in-depth for
      # the brief root window in the entrypoint; without these caps
      # guacd hits EACCES and logs
      # "Creation of recording failed: Exhausted all possible unique suffixes".
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── 1b. Additional guacd sidecar
  # To use, set GUACD_INSTANCES=guacd-2:4822 in your .env file.
  # You can duplicate this block for guacd-3, guacd-4, etc.
  guacd-2:
    build:
      context: ./guacd
      dockerfile: Dockerfile
    image: strata/custom-guacd:latest
    restart: unless-stopped
    profiles:
      - scale
    networks:
      - guac-internal
    volumes:
      - guac-recordings:/var/lib/guacamole/recordings
      - guac-drive:/var/lib/guacamole/drive
      - krb5-config:/etc/krb5
      - backend-config:/app/config:ro
    environment:
      - KRB5_CONFIG=/etc/krb5/krb5.conf
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      # See main `guacd` service for rationale.
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 2. Rust Backend (Proxy / API) ───────────────────────────────────
  #
  # Built from backend/Dockerfile — the unified image that
  # ships with Xvnc + Chromium baked in. The Web Browser Session
  # protocol works out of the box; RDP/SSH/VNC always work; the
  # VDI protocol is OFF by default and opted into via the overlay
  # docker-compose.vdi.yml (which adds the /var/run/docker.sock
  # mount — see the security warning in that file).
  #
  # Run:
  #   docker compose up -d                                                 # web + RDP + SSH + VNC
  #   docker compose -f docker-compose.yml -f docker-compose.vdi.yml up -d # +VDI
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: strata/backend:latest
    restart: unless-stopped
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - backend-config:/app/config
      # RW because the backend's retention sweeper (services::recordings)
      # deletes expired .guac files in addition to streaming them for
      # playback. Mounting :ro caused the cleanup loop to log a WARN
      # per expired file every cycle (EROFS).
      - guac-recordings:/var/lib/guacamole/recordings
      - guac-drive:/var/lib/guacamole/drive
      - krb5-config:/etc/krb5
      # Operator-supplied Playwright/Puppeteer login scripts for the
      # `web` protocol. Mount read-only so a compromised backend can't
      # tamper with the kiosk-login automation source. Empty/absent
      # directory is harmless if no `web` connection references a
      # login_script.
      - ${WEB_LOGIN_SCRIPTS_DIR:-./web-login-scripts}:/var/lib/strata/web-login-scripts:ro
      # Read-only view of the deployment's TLS certificate material so
      # the admin Health page can surface validity windows (public TLS,
      # DMZ link mTLS, CAs, etc). Backend never reads private keys —
      # only PEM `CERTIFICATE` blocks are parsed.
      - ./certs:/etc/strata/certs:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-strata}:${POSTGRES_PASSWORD:-strata_default}@postgres-local:5432/${POSTGRES_DB:-strata}}
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
      - GUACD_INSTANCES=${GUACD_INSTANCES:-}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
      - STRATA_ALLOWED_ORIGINS=${STRATA_ALLOWED_ORIGINS:-}
      # Enable trusting X-Forwarded-For from the frontend reverse proxy.
      # Set to 1 to permit parsing XFF; pair with STRATA_TRUSTED_PROXIES
      # to restrict which immediate peers are allowed to supply XFF.
      - STRATA_TRUST_XFF=${STRATA_TRUST_XFF:-1}
      # Comma-separated CIDRs or IPs for upstream proxies to trust.
      # In most local docker-compose setups the bridge network uses
      # 172.18.0.0/16; adjust to your environment's subnet as needed.
      - STRATA_TRUSTED_PROXIES=${STRATA_TRUSTED_PROXIES:-172.18.0.0/16}
      # Public base URL for SSO redirect_uri construction when the
      # backend sits behind a reverse proxy / DMZ relay that doesn't
      # forward Host/X-Forwarded-* headers. Optional — when unset,
      # the backend falls back to inferring from request headers.
      - BASE_URL=${BASE_URL:-}
      # Comma-separated allowlist of Host header values accepted when
      # deriving base URL from request headers. Ignored if BASE_URL
      # is set.
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      # Web (Chromium kiosk) — always available because the binaries
      # are baked into the image. Operators who don't define `web`
      # connections simply never trigger a spawn.
      - STRATA_WEB_ENABLED=${STRATA_WEB_ENABLED:-true}
      - STRATA_WEB_XVNC_PATH=/usr/bin/Xvnc
      - STRATA_WEB_CHROMIUM_PATH=/usr/bin/chromium
      - STRATA_WEB_LOGIN_SCRIPTS_DIR=/var/lib/strata/web-login-scripts
      # Hostname guacd uses to reach the spawned Xvnc listener. Must
      # be the backend's service name on the docker network — guacd
      # is a sibling container, so 127.0.0.1 won't work.
      - STRATA_WEB_VNC_HOST=${STRATA_WEB_VNC_HOST:-backend}
      # VDI (docker-spawned desktops) — DISABLED at this layer; flip
      # to true via docker-compose.vdi.yml which also mounts docker.sock.
      - STRATA_VDI_ENABLED=${STRATA_VDI_ENABLED:-false}
      # ── Antivirus (v1.12.0+) ──
      # All optional. Defaults are inert (off) so the backend behaves
      # identically to v1.11.x unless you opt in. To enable the bundled
      # clamav sidecar (started via `docker compose --profile av up -d`)
      # set in your .env file:
      #   STRATA_AV_BACKEND=clamav
      #   STRATA_AV_FAIL_MODE=block   # or `allow` for fail-open
      # The default STRATA_AV_CLAMD_ADDR matches the sidecar's service
      # name on the internal compose network; override only if you
      # point at an external clamd.
      - STRATA_AV_BACKEND=${STRATA_AV_BACKEND:-off}
      - STRATA_AV_FAIL_MODE=${STRATA_AV_FAIL_MODE:-block}
      - STRATA_AV_CLAMD_ADDR=${STRATA_AV_CLAMD_ADDR:-clamav:3310}
      - STRATA_AV_MAX_SCAN_SIZE=${STRATA_AV_MAX_SCAN_SIZE:-104857600}
      - STRATA_AV_TIMEOUT_MS=${STRATA_AV_TIMEOUT_MS:-60000}
      - STRATA_AV_COMMAND=${STRATA_AV_COMMAND:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    depends_on:
      guacd:
        condition: service_healthy
      vault:
        condition: service_healthy
      postgres-local:
        condition: service_healthy
        required: false

  # ── 3. Frontend SPA ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: strata/frontend:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/log/nginx:uid=101,gid=101
      - /run:uid=101,gid=101
      - /etc/nginx/conf.d:uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - guac-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./certs:/etc/nginx/ssl:ro
      - ./frontend/common.fragment:/etc/nginx/common.fragment:ro
      - ./frontend/http_only.conf:/etc/nginx/http_only.conf:ro
      - ./frontend/https_enabled.conf:/etc/nginx/https_enabled.conf:ro
      - ./frontend/njs.conf:/etc/nginx/njs/njs.conf:ro
      - ./frontend/remove_server.js:/etc/nginx/njs/remove_server.js:ro
    depends_on:
      backend:
        condition: service_healthy


  # ── 5. Local PostgreSQL ─────────────────────────────────────────────
  # Pinned base image (W1-8): digest refreshed by Renovate / Dependabot
  # (see .github/dependabot.yml docker ecosystem).
  postgres-local:
    image: postgres:16-alpine@sha256:93d55776e04376e19adb2733e3ccebb4392ee7dd86d8ff238503b30fe719c84f
    restart: unless-stopped
    profiles:
      - local-db
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-strata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strata_default}
      POSTGRES_DB: ${POSTGRES_DB:-strata}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strata -d strata"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 6. Bundled HashiCorp Vault ──────────────────────────────────────
  vault:
    image: hashicorp/vault:1.19@sha256:c4298db7f9b2ea8cab452cbff5877749087913aa035fcae62026cf16132929f5
    restart: unless-stopped
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - vault-data:/vault/data
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_API_ADDR: "http://vault:8200"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /vault/config
        cat > /vault/config/vault.hcl <<'EOF'
        storage "file" {
          path = "/vault/data"
        }
        listener "tcp" {
          address     = "0.0.0.0:8200"
          # NOTE: tls_disable=1 is appropriate ONLY because Vault is on
          # the private compose network and never exposed to the host
          # (no `ports:` mapping). Operators publishing Vault on a
          # routable address MUST switch this to a TLS-terminated
          # listener with `tls_cert_file` / `tls_key_file` and mount
          # the certs into /vault/config. See docs/security.md.
          tls_disable = 1
        }
        api_addr     = "http://vault:8200"
        cluster_addr = "http://vault:8201"
        ui           = false
        # mlock is enabled by default. The container is granted IPC_LOCK
        # above precisely so Vault can lock its secret pages out of
        # swap; disabling mlock here would defeat that hardening.
        EOF
        vault server -config=/vault/config/vault.hcl
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>&1 | grep -qE 'Sealed|initialized' || wget -qO- http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200 > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 5. ClamAV antivirus (optional, profile-gated) ────────────────────
  # Opt-in malware scanner for inbound Quick Share uploads and outbound
  # share requests. Enable by running:
  #   docker compose --profile av up -d
  # and setting these env vars in your .env file (they're already
  # passed through to the backend service above, but default to off):
  #   STRATA_AV_BACKEND=clamav
  #   STRATA_AV_CLAMD_ADDR=clamav:3310   # default — only override for external clamd
  #   STRATA_AV_FAIL_MODE=block          # or "allow" if you want degraded ops
  # The container ships with an empty signature DB and runs freshclam
  # on startup to pull the latest definitions from clamav.net (~250 MB
  # on first launch, then incremental). It does NOT expose port 3310
  # to the host — it's reachable only over the internal compose network.
  clamav:
    image: clamav/clamav:stable
    profiles:
      - av
    restart: unless-stopped
    networks:
      - guac-internal
    volumes:
      - clamav-db:/var/lib/clamav
    environment:
      # Let freshclam run on startup (the default), and keep clamd
      # running with on-access scanning disabled — we drive scans
      # explicitly via the INSTREAM TCP protocol from the backend.
      - CLAMAV_NO_FRESHCLAMD=false
      - CLAMD_STARTUP_DELAY=5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          # ClamAV's RAM usage scales with signature DB size — current
          # mainline DB is ~1.4 GB resident. Headroom prevents OOM
          # during freshclam reloads.
          memory: 3G
          cpus: "2"
    healthcheck:
      # clamd writes a UNIX socket and listens on TCP 3310; the
      # `clamdcheck.sh` script bundled in the image exits 0 when the
      # daemon answers PING. Generous start_period because the first
      # boot does a full DB download.
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

volumes:
  postgres-data:
    driver: local
  guac-recordings:
    driver: local
  guac-drive:
    driver: local
  krb5-config:
    driver: local
  backend-config:
    driver: local
  vault-data:
    driver: local
  clamav-db:
    driver: local

networks:
  guac-internal:
    driver: bridge
