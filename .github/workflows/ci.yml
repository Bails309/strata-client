name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # ── Secrets scanning ──────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency advisory scanning (Coding Standards §13.2 / §18.2) ──
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Rust: RustSec advisory database
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - name: Cache cargo-audit binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-bin

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi

      - name: Run cargo audit (workspace)
        working-directory: backend
        # Fail on vulnerabilities, unsound, and unmaintained advisories.
        # Yanked crates remain informational (no RUSTSEC ID to ignore).
        # Per-advisory ignores with justifications live in
        # backend/.cargo/audit.toml (auto-picked up by cargo-audit from
        # the working directory).
        # After the DMZ workspace conversion (Phase 0 of the DMZ plan)
        # the single resolved Cargo.lock lives at the repo root; point
        # cargo-audit at it explicitly so it audits the full closure
        # (backend + strata-protocol + strata-dmz).
        #
        # cargo-audit fetches the RustSec advisory DB from GitHub on
        # every run, which is occasionally flaky on hosted runners
        # ("An IO error occurred when talking to the server"). Retry
        # a few times with backoff before failing the gate so a single
        # transient network blip doesn't break CI.
        run: |
          set -e
          attempts=3
          for i in $(seq 1 $attempts); do
            if cargo audit -f ../Cargo.lock --deny unsound --deny unmaintained; then
              exit 0
            fi
            if [ "$i" -lt "$attempts" ]; then
              echo "::warning::cargo audit failed (attempt $i/$attempts); retrying in $((i * 10))s"
              sleep $((i * 10))
            fi
          done
          echo "::error::cargo audit failed after $attempts attempts"
          exit 1

      # cargo-audit only catches RUSTSEC IDs. cargo-deny adds:
      #   • License allow-list — block GPL/AGPL/non-SPDX licenses
      #     before they end up in a release artefact (Apache-2.0
      #     project, see deny.toml).
      #   • Banned-crate list — enforce the rustls-only TLS policy
      #     by failing the gate if `openssl` / `native-tls` enters
      #     the dep tree via a transitive bump.
      #   • Source allow-list — refuse to build against unknown
      #     registries or arbitrary git forks.
      # Config lives at repo-root deny.toml.
      - name: Cache cargo-deny binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny-bin
      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny >/dev/null 2>&1; then
            cargo install cargo-deny --locked
          fi
      - name: Run cargo deny (licenses, bans, sources)
        run: cargo deny --all-features check bans licenses sources

      # Node: npm advisory database
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

      - name: npm audit (e2e)
        working-directory: e2e
        run: npm audit --audit-level=high --omit=dev

  # ── Database migration validation ─────────────────────────────────
  migrations-check:
    name: DB Migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: strata
          POSTGRES_PASSWORD: strata
          POSTGRES_DB: strata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U strata"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls --locked
      - name: Apply all migrations
        env:
          DATABASE_URL: postgres://strata:strata@localhost:5432/strata
        run: sqlx migrate run --source backend/migrations
      - name: Verify no pending migrations
        env:
          DATABASE_URL: postgres://strata:strata@localhost:5432/strata
        run: |
          # Re-run should be a no-op. Capture output; fail if any "applied" lines appear.
          OUT=$(sqlx migrate run --source backend/migrations)
          echo "$OUT"
          if echo "$OUT" | grep -i "applied"; then
            echo "ERROR: migrations were not idempotent"
            exit 1
          fi

  # ── Backend: lint, check, test ────────────────────────────────────
  backend-check:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry & build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Workspace target lives at repo root since the DMZ refactor.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'backend/Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-v2-

      - name: Check formatting
        # Scoped to the strata-backend package so this job stays focused on
        # the existing backend; DMZ/protocol crates have their own coverage
        # in dmz-deps.yml.
        run: cargo fmt -p strata-backend -- --check

      - name: Clippy lint
        run: cargo clippy -p strata-backend --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test -p strata-backend -- --test-threads=1

      - name: Run strata-protocol unit tests
        # Pure-rust crate, runs fast and shares the cargo cache; doing
        # this in the same job keeps DMZ protocol coverage on the
        # critical-path PR check rather than relying on the
        # dmz-deps.yml workflow which only builds, never tests.
        working-directory: .
        run: cargo test -p strata-protocol

      - name: Run strata-dmz unit tests
        # The DMZ edge crate is a separate process at runtime but it
        # ships in the same workspace; run its unit tests on the PR
        # critical path so regressions in ws_proxy / link_server /
        # edge_signer / public_tls fail the gate immediately rather
        # than slipping through to release builds.
        working-directory: .
        run: cargo test -p strata-dmz

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate backend coverage report
        run: cargo tarpaulin -p strata-backend --skip-clean --out xml --out html --output-dir coverage/ --exclude-files src/main.rs --fail-under 19 -- --test-threads=1

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  # ── Frontend: lint, typecheck, unit tests ─────────────────────────
  frontend-check:
    name: Frontend (React)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ESLint runs as a hard gate. The historical 198-error baseline of
      # `jsx-a11y/label-has-associated-control` and `no-autofocus` issues has
      # been demoted to warnings (tracked under W4-2 for per-page ratchet);
      # all remaining errors are correctness/security and must stay at zero.
      - name: ESLint (frontend)
        run: npm run lint

      - name: Prettier format check (frontend)
        run: npm run format:check

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

      - name: Build
        run: npm run build

  # ── E2E tests (requires running stack) ────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [backend-check, frontend-check]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and load guacd
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./guacd
          file: ./guacd/Dockerfile
          tags: strata/custom-guacd:latest
          load: true
          cache-from: type=gha,scope=guacd

      - name: Build and load backend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./backend/Dockerfile
          tags: strata/backend:latest
          load: true
          cache-from: type=gha,scope=backend

      - name: Build and load frontend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./frontend/Dockerfile
          tags: strata/frontend:latest
          load: true
          cache-from: type=gha,scope=frontend

      - name: Start all services
        run: docker compose --profile local-db up -d --wait
        timeout-minutes: 10
        env:
          DEFAULT_ADMIN_PASSWORD: admin

      - name: Verify service logs on startup
        if: always()
        run: |
          echo "=== Container health status ==="
          docker compose ps -a
          echo ""
          echo "=== Health inspect ==="
          for svc in guacd vault postgres-local backend frontend; do
            cid=$(docker compose ps -q $svc 2>/dev/null || true)
            if [ -n "$cid" ]; then
              echo "--- $svc ---"
              docker inspect --format='{{.State.Status}} health={{.State.Health.Status}}' "$cid" 2>/dev/null || echo "(no health)"
              docker inspect --format='{{range .State.Health.Log}}{{.ExitCode}}: {{.Output}}{{end}}' "$cid" 2>/dev/null || true
            fi
          done
          echo ""
          echo "=== All service logs (last 80 lines each) ==="
          docker compose logs --tail=80

      - name: Save docker compose logs
        if: always()
        run: docker compose logs --no-color > /tmp/docker-compose-logs.txt 2>&1

      - name: Upload docker compose logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-compose-logs
          path: /tmp/docker-compose-logs.txt
          retention-days: 7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install E2E dependencies
        working-directory: e2e
        run: |
          npm ci --legacy-peer-deps
          npx playwright install --with-deps chromium

      # Silent test deletion guard: Playwright happily passes when
      # there are zero tests. Pin a floor so accidentally renaming a
      # spec file or scoping a `.only()` to one block can't make the
      # gate go green by erasing coverage. Bump this number whenever
      # a new spec is intentionally added.
      - name: Enforce E2E test count floor
        working-directory: e2e
        env:
          E2E_TEST_FLOOR: '140'
        run: |
          COUNT=$(npx playwright test --list --reporter=json | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>{const j=JSON.parse(s);const walk=(suites,n=0)=>suites.reduce((acc,su)=>acc+(su.specs?.length||0)+walk(su.suites||[],0),n);console.log(walk(j.suites||[]));})")
          echo "Discovered $COUNT E2E tests (floor: $E2E_TEST_FLOOR)"
          if [ "$COUNT" -lt "$E2E_TEST_FLOOR" ]; then
            echo "ERROR: E2E test count $COUNT below floor $E2E_TEST_FLOOR — did a spec get accidentally deleted or scoped?"
            exit 1
          fi

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail 50

      - name: Stop services
        if: always()
        run: docker compose --profile local-db down -v

  # ── Docker image builds (no push on PR) ───────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [backend-check, frontend-check]
    strategy:
      matrix:
        service: [backend, frontend, guacd]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.service == 'guacd' && './guacd' || '.' }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
