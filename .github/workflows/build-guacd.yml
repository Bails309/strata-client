name: Build Custom guacd Image

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      guac_version:
        description: 'Guacamole Server version/tag to build'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/custom-guacd

jobs:
  build-guacd:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Determine upstream version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.guac_version }}" ]; then
            echo "tag=${{ github.event.inputs.guac_version }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(curl -sL https://api.github.com/repos/apache/guacamole-server/releases/latest | jq -r '.tag_name')
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push custom guacd
        uses: docker/build-push-action@v5
        with:
          context: ./guacd
          file: ./guacd/Dockerfile
          push: true
          build-args: |
            GUAC_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
